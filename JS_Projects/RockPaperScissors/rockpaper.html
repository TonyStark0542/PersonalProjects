<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Project</title>
</head>
<body>
    <p>Rock Paper Scissors</p>

    <button onclick="
        playGame('Rock');
    ">Rock</button>

    <button onclick="
        playGame('Paper');
    ">Paper</button>


    <button onclick="
        playGame('Scissors');
    ">Scissors</button>

    <p class="js-result"></p>

    <p class="js-moves"></p>

    <p class="js-score"></p>

    <button onclick="
        resetbnt();
    ">Reset Scores</button>

    <script>
        let score = JSON.parse(localStorage.getItem('scoreVal')) || {
            wins: 0,
            losses: 0,
            ties: 0
            };
        
        updateScoreVal();

        function playGame(playerMove){
            const computerMove = pickComputerMove();

            let result = '';

            if(playerMove === 'Scissors'){
                if(computerMove === 'Rock'){
                    result = 'You Lose.';
                }
                else if(computerMove === 'Paper'){
                    result = 'You Win.';
                }
                else{
                    result = 'Tie.';
                }
            }
            else if(playerMove === 'Paper'){
                if(computerMove === 'Rock'){
                    result = 'You Win.';
                }
                else if(computerMove === 'Scissors'){
                    result = 'You Lose.';
                }
                else{
                    result = 'Tie.';
                }
            }
            else{
                if(computerMove === 'Paper'){
                    result = 'You Lose.';
                }
                else if(computerMove === 'Scissors'){
                    result = 'You Win.';
                }
                else{
                    result = 'Tie.';
                }
            }

            if(result === 'You Win.'){
                score.wins += 1; 
            }
            else if(result === 'You Lose.'){
                score.losses += 1;
            }
            else{
                score.ties += 1;
            }

            localStorage.setItem('scoreVal',JSON.stringify(score));

            updateScoreVal();

            document.querySelector('.js-result').innerHTML = result;

            document.querySelector('.js-moves').innerHTML = `You picked ${playerMove}. Computer picked ${computerMove}.`;

            // alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result} \n Wins: ${score.wins}, Lossses: ${score.losses}, Ties: ${score.ties}`);
        }

        function pickComputerMove(){
            const RandomNo = Math.random();

            let pc = '';

            if(RandomNo >= 0 && RandomNo < 1/3){
                pc = 'Rock';
            } 
            else if(RandomNo >= 1/3 && RandomNo < 2/3){
                pc = 'Paper';
            }
            else if(RandomNo >= 2/3 && RandomNo < 1){
                pc = 'Scissors';
            }

            return pc;
        }

        function resetbnt(){
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            updateScoreVal();
            localStorage.removeItem('scoreVal');
            document.querySelector('.js-result').innerHTML = '<p></p>';

            document.querySelector('.js-moves').innerHTML = '<p></p>';
        }

        function updateScoreVal(){
            document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        }
    </script>
</body>
</html>
