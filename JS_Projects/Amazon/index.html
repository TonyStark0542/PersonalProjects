<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Tutorial</title>
</head>
<body>
    <h1>Cart Quantity</h1>
    <button onclick="console.log('Cart Quantity: ' + cartQuantity)">Show Quantity</button>
    <button onclick="console.log('Cart Quantity: ' + (cartQuantity+=1))">Add to Cart</button>
    <button onclick="console.log('Cart Quantity: ' + (cartQuantity+=2))">+2</button>
    <button onclick="console.log('Cart Quantity: ' + (cartQuantity+=3))">+3</button>
    <button 
        onclick="
        console.log('Cart was reset:');
        console.log('Cart Quantity: ' + (cartQuantity=0));
    ">Reset Cart</button>
    <button onclick="
        if(cartQuantity <= 0){
            console.log(`Cart Quantity: 0`);
        }
        else{
            cartQuantity--;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
        
    ">Remove from Cart</button>
    <script>
        let cartQuantity = 0;
    </script>
</body>
</html>
