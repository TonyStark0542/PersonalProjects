<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="final_rock_paper.css">
</head>
<body>
    <p class="title">Rock Paper Scissors</p>
    
    <button class="move-button js-rock-button">
        <img class="move-icon" src="/RockPaper_Project/rock_emoji.png">
    </button>

    <button class="move-button js-paper-button">
        <img class="move-icon" src="/RockPaper_Project/paper_emoji.png">
    </button>

    <button class="move-button js-scissors-button">
        <img class="move-icon" src="/RockPaper_Project/scissors_emoji.png">
    </button>

    <p class="result js-result"></p>
    <p class="js-moves-chosen"></p>

    <p class="score js-score"></p>
    <button class="reset-score-button" onclick="
        resetScore();
    ">
        Reset Score
    </button>

    <button class="js-autoPlay css-autoPlay" onclick="autoplay();">Auto Play</button>

    <script src="final_rock_paper.js"></script>
</body>
</html>
